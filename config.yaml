# Home Assistant Add-on Configuration
name: "HA Event Extractor"
version: "1.0.0"
slug: "ha_event_extractor"
description: "Extracts historical device events from Home Assistant and streams them to a remote Cloud API"
url: "https://github.com/example/ha-event-extractor"

# Supported architectures
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386

# Map the config directory to access the database
map:
  - config:ro

# Add-on options configurable via HA UI
options:
  cloud_auth_token: ""
  sync_interval_minutes: 5
  api_endpoint: "https://api.example-cloud.com/v1/ingest"
  batch_size: 100

# Schema for options validation
schema:
  cloud_auth_token: str
  sync_interval_minutes: int(1,1440)
  api_endpoint: url
  batch_size: int(10,1000)

# Startup configuration
startup: application
boot: auto

# Resource constraints
timeout: 60
