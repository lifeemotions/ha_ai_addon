# Home Assistant Add-on Configuration
name: "Life Emotions AI"
version: "1.0.0"
slug: "lifeemotions_ai_addon"
description: "Extracts historical device events from Home Assistant, streams them to a remote Cloud API and manages a local AI model"
url: "https://github.com/lifeemotions/ha_ai_addon"

# Supported architectures
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386

# Map the config directory to access the database (read-only).
# Note: homeassistant_api is not declared because this add-on reads the
# SQLite database directly. Add "homeassistant_api: true" here if HA REST
# API access is ever needed.
map:
  - config:ro

# Add-on options configurable via HA UI
options:
  cloud_auth_token: ""
  sync_interval_minutes: 5
  api_endpoint: "https://api.example-cloud.com/v1/ingest"
  batch_size: 100

# Schema for options validation
schema:
  cloud_auth_token: str
  sync_interval_minutes: int(1,1440)
  api_endpoint: url
  batch_size: int(10,1000)

# Startup configuration
startup: application
boot: auto

# Resource constraints
timeout: 60
