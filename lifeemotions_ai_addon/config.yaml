# Home Assistant Add-on Configuration
name: "Life Emotions AI"
version: "1.3.0"
slug: "lifeemotions_ai_addon"
description: "Extracts historical device events from Home Assistant, streams them to a remote Cloud API and manages a local AI model"
url: "https://github.com/lifeemotions/ha_ai_addon"

# Minimum Home Assistant version (requires 2023.4+ database schema)
homeassistant: "2023.4.0"

# Supported architectures
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386

# Map the config directory (read-write: needed for model downloads and config caching).
map:
  - homeassistant_config:rw

# Enable access to the Home Assistant API (provides SUPERVISOR_TOKEN)
homeassistant_api: true

# Add-on options configurable via HA UI
options:
  cloud_auth_token: ""

# Schema for options validation
schema:
  cloud_auth_token: str

# Startup configuration
startup: application
boot: auto

# Disable Docker init so s6-overlay can run as PID 1
init: false

# Resource constraints
timeout: 60
